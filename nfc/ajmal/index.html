<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maplorix Recruitment</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Signika:wght@300;400;500;600;700;800;900&family=Comfortaa:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="card-container">
      <div class="business-card">
        <div class="content-section">
          <div class="profile-section">
            <img
              src="logo-complex.svg"
              alt="Maplorix Logo"
              class="company-logo"
            />
            <div class="profile-info">
              <h1 class="profile-name">Ajmal KM</h1>
              <p class="profile-title">Managing Director</p>
            </div>
          </div>

          <div class="actions-section">
            <a href="tel:+971525299961" class="action-button primary">
              <i class="fas fa-phone"></i>
              <span>Call Now</span>
            </a>
            <a
              href="mailto:ajmalkm@maplorix.ae"
              class="action-button secondary"
            >
              <i class="fas fa-envelope"></i>
              <span>Send Email</span>
            </a>
            <a
              href="Ajmal KM - Managing Director.vcf"
              class="action-button secondary"
            >
              <i class="fas fa-user-plus"></i>
              <span>Add to Contacts</span>
            </a>
            <a
              href="https://www.maplorix.ae"
              class="action-button secondary"
              target="_blank"
            >
              <i class="fas fa-globe"></i>
              <span>Visit Website</span>
            </a>
            <a
              href="https://maps.app.goo.gl/ZcDmFg6kV2v1Av119"
              class="action-button secondary"
              target="_blank"
            >
              <i class="fas fa-map-marker-alt"></i>
              <span>Get Directions</span>
            </a>
          </div>

          <div class="contact-section"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
